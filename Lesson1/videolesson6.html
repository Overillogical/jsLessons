<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Lesson1</title>
  <script>
    let sum = 1000;
    const percent = 15;
    const result = 2000;
    let yearspassed = 0;
    while (sum <= result) {
      yearspassed += 1;
      sum += sum * percent / 100;
    }
    console.log(`Мы смогли накопить сумму за ${yearspassed} лет`)

  </script>
